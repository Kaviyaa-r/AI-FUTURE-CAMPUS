<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AntiGravity — Your career. Supercharged by AI. The next-generation Gen Z student employability platform." />
  <title>AntiGravity — Career, Supercharged by AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────────── */
    :root {
      --bg-base:       #0A0A0F;
      --bg-card:       #12121A;
      --bg-card-hover: #16161F;
      --border-purple: rgba(124, 58, 237, 0.2);
      --border-purple-active: rgba(124, 58, 237, 0.7);
      --accent-purple: #7C3AED;
      --accent-teal:   #06B6D4;
      --accent-error:  #EF4444;
      --accent-success:#10B981;
      --accent-warn:   #F59E0B;
      --text-primary:  #F8F8FF;
      --text-secondary:#A0A0B0;
      --text-muted:    #5A5A70;
      --glow-purple:   0 0 20px rgba(124,58,237,0.4);
      --glow-teal:     0 0 20px rgba(6,182,212,0.4);
    }

    /* ─── RESET & BASE ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    /* ─── ANIMATED BACKGROUND ───────────────────────────────── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 8s ease-in-out infinite;
      opacity: 0.35;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7C3AED 0%, transparent 70%);
      top: -150px; left: -150px;
      animation-duration: 10s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #06B6D4 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation-duration: 13s;
      animation-delay: -3s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #7C3AED 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 15s;
      animation-delay: -6s;
      opacity: 0.15;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -30px) scale(1.05); }
      66%       { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ─── PARTICLES ─────────────────────────────────────────── */
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: rgba(124,58,237,0.6);
      animation: particleDrift linear infinite;
    }
    @keyframes particleDrift {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-100px) translateX(var(--drift)); opacity: 0; }
    }

    /* ─── SCREEN WRAPPER ────────────────────────────────────── */
    .screen {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
      animation: screenFadeIn 0.5s ease forwards;
    }
    @keyframes screenFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── GLASS CARD ─────────────────────────────────────────── */
    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border-purple);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.1),
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.92) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ─── LOGO ───────────────────────────────────────────────── */
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-teal));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 900;
      box-shadow: var(--glow-purple);
    }
    .logo-sub { color: var(--accent-teal); }

    /* ─── TYPOGRAPHY ─────────────────────────────────────────── */
    .title-xl {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
    }
    .title-lg {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-teal) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-sub {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .text-muted { color: var(--text-muted); font-size: 0.85rem; }

    /* ─── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      border: none; border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 600; font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      text-decoration: none;
      white-space: nowrap;
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }
    .btn:hover::after { background: rgba(255,255,255,0.06); }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-purple) 0%, #5B21B6 100%);
      color: #fff;
      padding: 14px 28px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 30px rgba(124,58,237,0.55);
      transform: translateY(-1px);
    }

    .btn-teal {
      background: linear-gradient(135deg, var(--accent-teal) 0%, #0891B2 100%);
      color: #fff;
      padding: 14px 28px;
      box-shadow: 0 4px 20px rgba(6,182,212,0.3);
    }
    .btn-teal:hover {
      box-shadow: 0 6px 30px rgba(6,182,212,0.5);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-purple);
      color: var(--text-secondary);
      padding: 12px 24px;
    }
    .btn-ghost:hover {
      border-color: rgba(124,58,237,0.5);
      color: var(--text-primary);
      background: rgba(124,58,237,0.07);
    }

    .btn-google {
      background: var(--bg-card-hover);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      padding: 13px 24px;
      width: 100%;
    }
    .btn-google:hover {
      border-color: rgba(255,255,255,0.25);
      background: #1a1a26;
    }

    .btn-full { width: 100%; }
    .btn-lg { padding: 16px 32px; font-size: 1rem; border-radius: 14px; }
    .btn-xl { padding: 18px 40px; font-size: 1.1rem; border-radius: 16px; }

    .btn-loading { pointer-events: none; opacity: 0.8; }
    .btn-loading .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── FORM ELEMENTS ──────────────────────────────────────── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
      display: flex; align-items: center;
    }
    .input-icon {
      position: absolute; left: 14px;
      color: var(--text-muted);
      display: flex; align-items: center;
      pointer-events: none;
      transition: color 0.2s;
    }
    .input-wrapper:focus-within .input-icon { color: var(--accent-purple); }

    .input-icon-right {
      position: absolute; right: 14px;
      color: var(--text-muted);
      background: none; border: none;
      cursor: pointer;
      display: flex; align-items: center;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .input-icon-right:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }

    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 13px 14px 13px 42px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      border-color: var(--accent-purple);
      background: rgba(124,58,237,0.06);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .form-input.input-error {
      border-color: var(--accent-error);
      background: rgba(239,68,68,0.05);
    }
    .form-input.input-error:focus {
      box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
    }
    .form-input.has-right-icon { padding-right: 44px; }

    .form-error {
      display: flex; align-items: center; gap: 5px;
      color: var(--accent-error);
      font-size: 0.8rem;
      font-weight: 500;
      animation: slideDown 0.2s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── PASSWORD STRENGTH ──────────────────────────────────── */
    .strength-bar-wrap {
      display: flex; gap: 4px;
      margin-top: 4px;
    }
    .strength-seg {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      transition: background 0.35s ease;
    }
    .strength-seg.active-weak   { background: var(--accent-error); }
    .strength-seg.active-medium { background: var(--accent-warn); }
    .strength-seg.active-strong { background: var(--accent-success); }
    .strength-label {
      font-size: 0.75rem; font-weight: 600;
      margin-top: 3px;
      transition: color 0.3s;
    }
    .strength-label.weak   { color: var(--accent-error); }
    .strength-label.medium { color: var(--accent-warn); }
    .strength-label.strong { color: var(--accent-success); }

    /* ─── TOGGLE ─────────────────────────────────────────────── */
    .toggle-wrap {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
    }
    .toggle {
      width: 44px; height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      position: relative;
      transition: background 0.3s;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .toggle.on { background: var(--accent-purple); border-color: var(--accent-purple); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .toggle.on::after { transform: translateX(20px); }
    .toggle-label { font-size: 0.9rem; color: var(--text-secondary); user-select: none; }

    /* ─── ROLE TOGGLE (Signup) ───────────────────────────────── */
    .role-switch {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }
    .role-switch-btn {
      flex: 1; padding: 9px;
      border: none; border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      color: var(--text-muted);
      background: transparent;
    }
    .role-switch-btn.active {
      background: var(--accent-purple);
      color: #fff;
      box-shadow: 0 2px 12px rgba(124,58,237,0.4);
    }
    .role-switch-btn:not(.active):hover { color: var(--text-primary); }

    /* ─── DIVIDER ─────────────────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--text-muted); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.08);
    }

    /* ─── LINK ────────────────────────────────────────────────── */
    .link {
      color: var(--accent-purple);
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      border: none; background: none;
      font-family: 'Inter', sans-serif;
      font-size: inherit;
      transition: color 0.2s;
    }
    .link:hover { color: #9F67FF; text-decoration: underline; }
    .link-teal { color: var(--accent-teal); }
    .link-teal:hover { color: #22D3EE; }

    /* ─── TOAST ───────────────────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
      align-items: center;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      background: #1A1A28;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.9rem;
      color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    .toast.fade-out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(8px) scale(0.95); }
    }
    .toast-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .toast-dot.info    { background: var(--accent-teal); }
    .toast-dot.success { background: var(--accent-success); }
    .toast-dot.error   { background: var(--accent-error); }
    .toast-dot.warn    { background: var(--accent-warn); }

    /* ─── SPLASH SCREEN ──────────────────────────────────────── */
    .splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 32px;
      padding: 48px 24px;
      min-height: 100vh;
    }
    .splash-logo { animation: splashLogoIn 0.8s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes splashLogoIn {
      from { opacity: 0; transform: translateY(-30px) scale(0.8); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .logo-xl {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-teal));
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: 900;
      margin: 0 auto 16px;
      box-shadow: var(--glow-purple), 0 0 60px rgba(6,182,212,0.2);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: var(--glow-purple), 0 0 60px rgba(6,182,212,0.2); }
      50%       { box-shadow: 0 0 40px rgba(124,58,237,0.6), 0 0 80px rgba(6,182,212,0.3); }
    }
    .splash-tagline {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.7;
      animation: fadeUp 0.8s 0.3s ease both;
    }
    .splash-title {
      animation: fadeUp 0.8s 0.1s ease both;
    }
    .splash-ctas {
      display: flex; flex-direction: column; gap: 14px;
      width: 100%; max-width: 320px;
      animation: fadeUp 0.8s 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .splash-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.8rem; font-weight: 600;
      color: var(--accent-purple);
      letter-spacing: 0.5px;
      animation: fadeUp 0.8s 0s ease both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-teal);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
    .splash-features {
      display: flex; gap: 24px;
      flex-wrap: wrap; justify-content: center;
      animation: fadeUp 0.8s 0.7s ease both;
    }
    .splash-feature-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; color: var(--text-muted);
    }
    .splash-feature-item .dot { color: var(--accent-teal); }

    /* ─── ROLE SELECTOR CARDS ────────────────────────────────── */
    .role-cards { display: flex; flex-direction: column; gap: 16px; }
    .role-card {
      background: rgba(255,255,255,0.02);
      border: 2px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; align-items: center; gap: 20px;
      position: relative;
      overflow: hidden;
    }
    .role-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-teal));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .role-card:hover {
      border-color: rgba(124,58,237,0.4);
      transform: translateX(4px);
      background: rgba(124,58,237,0.04);
    }
    .role-card.selected {
      border-color: var(--accent-purple);
      background: rgba(124,58,237,0.08);
      box-shadow: 0 0 0 1px rgba(124,58,237,0.3), var(--glow-purple);
    }
    .role-icon-wrap {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative; z-index: 1;
      font-size: 1.6rem;
    }
    .role-icon-student {
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
    }
    .role-icon-admin {
      background: rgba(6,182,212,0.12);
      border: 1px solid rgba(6,182,212,0.3);
    }
    .role-text { position: relative; z-index: 1; }
    .role-title {
      font-weight: 700; font-size: 1.05rem;
      margin-bottom: 4px;
    }
    .role-desc { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; }
    .role-check {
      margin-left: auto;
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative; z-index: 1;
      transition: all 0.3s;
    }
    .role-card.selected .role-check {
      background: var(--accent-purple);
      border-color: var(--accent-purple);
    }
    .role-check-inner {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      transform: scale(0);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .role-card.selected .role-check-inner { opacity: 1; transform: scale(1); }

    /* ─── GOOGLE LOGO ────────────────────────────────────────── */
    .google-logo {
      width: 20px; height: 20px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="%23EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="%234285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="%23FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="%2334A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>') center/contain no-repeat;
      flex-shrink: 0;
    }

    /* ─── GRID / UTILITIES ───────────────────────────────────── */
    .flex  { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center  { justify-content: center; }
    .gap-2  { gap: 8px; }
    .gap-3  { gap: 12px; }
    .gap-4  { gap: 16px; }
    .gap-5  { gap: 20px; }
    .gap-6  { gap: 24px; }
    .flex-col { flex-direction: column; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mt-6 { margin-top: 24px; }
    .text-center { text-align: center; }
    .w-full { width: 100%; }

    /* ─── INLINE ERROR BANNER ────────────────────────────────── */
    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.88rem;
      color: #FCA5A5;
      display: flex; align-items: center; gap: 8px;
      animation: slideDown 0.25s ease;
    }
    .alert-info {
      background: rgba(6,182,212,0.08);
      border: 1px solid rgba(6,182,212,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.88rem;
      color: #67E8F9;
      display: flex; align-items: center; gap: 8px;
    }

    /* ─── PROGRESS BAR ───────────────────────────────────────── */
    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-teal));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .glass-card { padding: 28px 20px; }
      .splash-ctas { max-width: 100%; }
    }

    /* ─── WIZARD STEPPER ─────────────────────────────────────── */
    .wizard-wrap {
      width: 100%; max-width: 560px;
      display: flex; flex-direction: column; gap: 0;
    }
    .wizard-card {
      background: var(--bg-card);
      border: 1px solid var(--border-purple);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(124,58,237,0.08), 0 24px 64px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .step-dots {
      display: flex; gap: 8px; justify-content: center;
      margin-bottom: 28px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .step-dot.active {
      background: var(--accent-purple);
      width: 24px;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(124,58,237,0.5);
    }
    .step-dot.done {
      background: var(--accent-teal);
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .skill-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem; font-weight: 600;
      color: #C4B5FD;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .skill-tag:hover { background: rgba(124,58,237,0.22); transform: translateY(-1px); }
    .skill-tag.selected {
      background: rgba(124,58,237,0.3);
      border-color: var(--accent-purple);
      color: #fff;
      box-shadow: 0 0 12px rgba(124,58,237,0.3);
    }
    .form-select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 13px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    .form-select:focus {
      border-color: var(--accent-purple);
      background: rgba(124,58,237,0.06);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .form-select option { background: #12121A; }
    .form-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 13px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
      resize: vertical;
      min-height: 90px;
    }
    .form-textarea:focus {
      border-color: var(--accent-purple);
      background: rgba(124,58,237,0.06);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .form-textarea::placeholder { color: var(--text-muted); }

    /* ─── AI ANALYZING SCREEN ────────────────────────────────── */
    .analyzing-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      gap: 24px; min-height: 100vh; padding: 24px;
    }
    .ai-orb {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-teal));
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      animation: aiPulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(124,58,237,0.5), 0 0 120px rgba(6,182,212,0.2);
    }
    @keyframes aiPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(124,58,237,0.5), 0 0 120px rgba(6,182,212,0.2); }
      50% { transform: scale(1.06); box-shadow: 0 0 80px rgba(124,58,237,0.7), 0 0 160px rgba(6,182,212,0.35); }
    }
    .analyzing-steps {
      display: flex; flex-direction: column; gap: 10px;
      max-width: 320px; width: 100%;
    }
    .analyzing-step {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.88rem;
      color: var(--text-muted);
      transition: all 0.4s ease;
    }
    .analyzing-step.done {
      color: var(--text-primary);
      border-color: rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.05);
    }
    .analyzing-step.active {
      color: #C4B5FD;
      border-color: rgba(124,58,237,0.4);
      background: rgba(124,58,237,0.08);
    }

    /* ─── DASHBOARD ──────────────────────────────────────────── */
    .dashboard {
      min-height: 100vh; padding: 32px 24px;
      max-width: 1100px; margin: 0 auto;
      position: relative; z-index: 1;
    }
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
    }
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .dash-card {
      background: var(--bg-card);
      border: 1px solid var(--border-purple);
      border-radius: 20px;
      padding: 28px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .dash-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(124,58,237,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .dash-card:hover {
      border-color: rgba(124,58,237,0.4);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(124,58,237,0.1);
    }
    .dash-card-title {
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 6px;
    }
    .score-ring {
      position: relative;
      width: 120px; height: 120px;
      margin: 0 auto 16px;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-num {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
    }
    .score-num {
      font-size: 2.2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .score-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
    .role-match-list { display: flex; flex-direction: column; gap: 14px; }
    .role-match-item {
      display: flex; flex-direction: column; gap: 6px;
    }
    .role-match-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .role-match-name { font-weight: 600; font-size: 0.95rem; }
    .role-match-pct {
      font-size: 0.82rem; font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
    }
    .match-bar {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
    }
    .match-bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .gap-list { display: flex; flex-direction: column; gap: 12px; }
    .gap-item {
      display: flex; flex-direction: column; gap: 4px;
    }
    .gap-header { display: flex; justify-content: space-between; align-items: center; }
    .gap-skill-name { font-size: 0.9rem; font-weight: 600; }
    .gap-score {
      font-size: 0.78rem; font-weight: 700;
      color: var(--text-muted);
      font-family: 'Space Grotesk', sans-serif;
    }
    .gap-bar { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .gap-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
    }
    .roadmap-list { display: flex; flex-direction: column; gap: 0; }
    .roadmap-item {
      display: flex; gap: 16px; padding-bottom: 20px;
      position: relative;
    }
    .roadmap-item:last-child { padding-bottom: 0; }
    .roadmap-line {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0;
    }
    .roadmap-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .roadmap-connector {
      width: 2px; flex: 1; min-height: 16px;
      background: linear-gradient(to bottom, rgba(124,58,237,0.4), rgba(6,182,212,0.2));
      margin: 4px 0;
    }
    .roadmap-content { flex: 1; padding-top: 4px; }
    .roadmap-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .roadmap-desc { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
    .roadmap-badge {
      display: inline-block;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .insights-list { display: flex; flex-direction: column; gap: 10px; }
    .insight-item {
      display: flex; gap: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.87rem;
      line-height: 1.5;
      color: var(--text-secondary);
    }
    .insight-icon { flex-shrink: 0; font-size: 1.1rem; margin-top: 1px; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    @media (max-width: 640px) {
      .dashboard { padding: 20px 16px; }
      .dash-grid { grid-template-columns: 1fr; }
      .wizard-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react-hook-form@7.48.2/dist/index.umd.js" crossorigin></script>
  <script src="https://unpkg.com/zod@3.22.4/lib/index.umd.js" crossorigin></script>
  <script src="https://unpkg.com/@hookform/resolvers@3.3.2/dist/zod.umd.js" crossorigin></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js" crossorigin></script>
  <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js" crossorigin></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;
    const { useForm } = window.ReactHookForm;
    const z = window.Zod;
    const { zodResolver } = window.HookFormResolvers;
    const { motion, AnimatePresence } = window.Motion;
    const { Mail, Lock, User, Eye, EyeOff, Check, X, AlertCircle, Info, Zap, Star, Shield, GraduationCap, Building, ArrowRight, Sparkles, Rocket } = window.lucideReact || window.LucideReact || {};

    /* ══════════════════════════════════════════════════════════
       AUTH STORE — localStorage mock auth
     ══════════════════════════════════════════════════════════ */
    const AuthContext = createContext(null);
    const useAuthStore = () => useContext(AuthContext);

    const AuthProvider = ({ children }) => {
      const [currentUser, setCurrentUser] = useState(null);

      const signup = (name, email, password, role) => {
        const user = {
          name, email,
          passwordHash: btoa(password),
          role, createdAt: Date.now()
        };
        localStorage.setItem('ag_user', JSON.stringify(user));
        return user;
      };

      const login = (email, password) => {
        const raw = localStorage.getItem('ag_user');
        if (!raw) return { success: false, error: 'No account found. Please sign up.' };
        const user = JSON.parse(raw);
        if (user.email !== email) return { success: false, error: 'No account found with that email.' };
        if (atob(user.passwordHash) !== password) return { success: false, error: 'Incorrect password.' };
        return { success: true, user };
      };

      const persistSession = (email, role, remember) => {
        const session = { email, role, loggedInAt: Date.now() };
        if (remember) {
          localStorage.setItem('ag_session', JSON.stringify(session));
        } else {
          sessionStorage.setItem('ag_session', JSON.stringify(session));
        }
        setCurrentUser(session);
      };

      const getSession = () => {
        const ls = localStorage.getItem('ag_session');
        const ss = sessionStorage.getItem('ag_session');
        return ls ? JSON.parse(ls) : ss ? JSON.parse(ss) : null;
      };

      return (
        <AuthContext.Provider value={{ signup, login, persistSession, getSession, currentUser }}>
          {children}
        </AuthContext.Provider>
      );
    };

    /* ══════════════════════════════════════════════════════════
       TOAST SYSTEM
     ══════════════════════════════════════════════════════════ */
    const ToastContext = createContext(null);
    const useToast = () => useContext(ToastContext);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);

      const addToast = useCallback((message, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, message, type }]);
        setTimeout(() => {
          setToasts(t => t.map(toast => toast.id === id ? { ...toast, fading: true } : toast));
          setTimeout(() => setToasts(t => t.filter(toast => toast.id !== id)), 350);
        }, 3000);
      }, []);

      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.fading ? 'fade-out' : ''}`}>
                <span className={`toast-dot ${t.type}`}></span>
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    /* ══════════════════════════════════════════════════════════
       ANIMATED BACKGROUND
     ══════════════════════════════════════════════════════════ */
    const AnimatedBg = () => {
      const particles = Array.from({ length: 20 }, (_, i) => ({
        id: i,
        left: `${Math.random() * 100}%`,
        delay: `${Math.random() * 8}s`,
        duration: `${6 + Math.random() * 8}s`,
        drift: `${(Math.random() - 0.5) * 100}px`,
        size: `${1 + Math.random() * 3}px`,
        opacity: 0.2 + Math.random() * 0.5,
      }));

      return (
        <div className="bg-canvas">
          <div className="orb orb-1"></div>
          <div className="orb orb-2"></div>
          <div className="orb orb-3"></div>
          {particles.map(p => (
            <div
              key={p.id}
              className="particle"
              style={{
                left: p.left,
                animationDelay: p.delay,
                animationDuration: p.duration,
                '--drift': p.drift,
                width: p.size, height: p.size,
                opacity: p.opacity,
              }}
            />
          ))}
        </div>
      );
    };

    /* ══════════════════════════════════════════════════════════
       ZOD FORM SCHEMA & PASSWORD STRENGTH
     ══════════════════════════════════════════════════════════ */
    const signupSchema = z
      .object({
        name: z.string().min(2, { message: 'Name must be at least 2 characters' }),
        email: z.string().min(1, { message: 'Email is required' }).email({ message: 'Enter a valid email address' }),
        password: z.string().min(8, { message: 'Password must be at least 8 characters' }),
        confirm: z.string().min(1, { message: 'Please confirm your password' }),
        role: z.enum(['student', 'admin']),
      })
      .refine((data) => data.password === data.confirm, {
        message: 'Passwords do not match',
        path: ['confirm'],
      });

    const loginSchema = z.object({
      email: z.string().min(1, { message: 'Email is required' }).email({ message: 'Enter a valid email address' }),
      password: z.string().min(8, { message: 'Password must be at least 8 characters' }),
    });

    const passwordStrength = pw => {
      if (!pw || pw.length < 6) return 0;
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      if (pw.length >= 12) score++;
      return Math.min(Math.ceil(score / 2), 3); // 1=weak 2=medium 3=strong
    };

    const StrengthBar = ({ password }) => {
      const strength = passwordStrength(password);
      const labels = ['', 'Weak', 'Medium', 'Strong'];
      const classes = ['', 'weak', 'medium', 'strong'];
      return password ? (
        <div>
          <div className="strength-bar-wrap">
            {[1,2,3].map(seg => (
              <div key={seg} className={`strength-seg ${strength >= seg ? `active-${classes[strength]}` : ''}`} />
            ))}
          </div>
          <div className={`strength-label ${classes[strength]}`}>{labels[strength]}</div>
        </div>
      ) : null;
    };

    /* ══════════════════════════════════════════════════════════
       SPLASH SCREEN
     ══════════════════════════════════════════════════════════ */
    const containerVariants = {
      hidden: { opacity: 0 },
      show: {
        opacity: 1,
        transition: {
          staggerChildren: 0.15,
          delayChildren: 0.1,
        },
      },
    };

    const itemVariants = {
      hidden: { opacity: 0, y: 25 },
      show: {
        opacity: 1,
        y: 0,
        transition: {
          duration: 0.6,
          ease: [0.25, 1, 0.5, 1],
        },
      },
    };

    const SplashScreen = ({ onGetStarted, onLogin }) => (
      <div className="screen">
        <motion.div
          variants={containerVariants}
          initial="hidden"
          animate="show"
          className="splash"
        >
          <motion.div variants={itemVariants} className="splash-badge">
            <span className="badge-dot"></span>
            Now in Beta — Limited Access
          </motion.div>

          <motion.div variants={itemVariants} className="splash-logo text-center">
            <div className="logo-xl">
              {Zap && <Zap className="w-9 h-9 text-white fill-white" />}
            </div>
            <h1 className="title-xl">
              Skill<span className="gradient-text">Bridge</span>
            </h1>
          </motion.div>

          <motion.p variants={itemVariants} className="splash-tagline">
            Your career. <strong style={{color:'var(--text-primary)'}}>Supercharged by AI.</strong><br/>
            Skill gaps closed. Employability unlocked. Future secured.
          </motion.p>

      const [screen, setScreen] = useState('splash');

      const handleSignupComplete = (role) => {
        if (!role) {
          setScreen('role');
        } else {
          onSignupComplete && onSignupComplete(role);
        }
      };

      const handleRoleContinue = (role) => {
        onSignupComplete && onSignupComplete(role);
      };

      const screens = {
        splash: (
          <SplashScreen
            onGetStarted={() => setScreen('signup')}
            onLogin={() => setScreen('login')}
          />
        ),
        signup: (
          <SignupForm
            onSignupComplete={handleSignupComplete}
            onGoLogin={() => setScreen('login')}
          />
        ),
        login: (
          <LoginForm
            onLoginComplete={onLoginComplete}
            onGoSignup={() => setScreen('signup')}
          />
        ),
        role: (
          <RoleSelector onContinue={handleRoleContinue} />

      };

        <div className="relative min-h-screen w-full bg-[#0A0A0F] text-[#F8F8FF] overflow-hidden flex items-center justify-center">

    const SKILLS_LIST = [
      'Python','JavaScript','React','Node.js','SQL','Machine Learning',
      'Data Analysis','UI/UX Design','Figma','Java','C++','AWS',
      'Docker','Git','Communication','Leadership','Problem Solving',
      'Project Management','Excel','Tableau','Flutter','Kotlin',
      'Swift','TypeScript','Django','FastAPI','TensorFlow','Power BI'
    ];
    const GOAL_ROLES = [
      'Software Engineer','Data Scientist','Product Manager',
      'UI/UX Designer','Full Stack Developer','DevOps Engineer',
      'Business Analyst','Machine Learning Engineer','Cloud Architect',
      'Cybersecurity Analyst'
    ];

      const [step, setStep] = useState(0);
      const [profile, setProfile] = useState({
        branch: '', year: '', cgpa: '', internships: '',
        skills: [],
        goalRole: '', experience: '', bio: ''
      });

      const update = (key, val) => setProfile(p => ({ ...p, [key]: val }));
      const toggleSkill = (s) => {
        setProfile(p => ({
          ...p,
          skills: p.skills.includes(s) ? p.skills.filter(x => x !== s) : [...p.skills, s]
        }));
      };

      const canNext = () => {
        if (step === 0) return profile.branch && profile.year && profile.cgpa;
        if (step === 1) return profile.skills.length >= 3;
        if (step === 2) return profile.goalRole;
        return false;
      };

      const handleFinish = () => {
        localStorage.setItem('antigravity_student_profile', JSON.stringify(profile));
        onComplete(profile);
      };

      const stepTitles = ['About You', 'Your Skills', 'Career Goals'];
      const stepIcons = ['🎓', '⚡', '🚀'];

            </div>

                <motion.div
                  key={step}
                  initial={{opacity:0, x:30}}
                  animate={{opacity:1, x:0}}
                  exit={{opacity:0, x:-30}}
                  transition={{duration:0.3, ease:[0.25,1,0.5,1]}}

                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
                        <div className="form-group">
                          <label className="form-label">Year</label>
                          <select className="form-select" value={profile.year} onChange={e=>update('year',e.target.value)}>
                            <option value="">Year</option>
                            {['1st Year','2nd Year','3rd Year','4th Year','Graduated'].map(y=>(
                              <option key={y} value={y}>{y}</option>
                            ))}
                          </select>
                        </div>
                        <div className="form-group">
                          <label className="form-label">CGPA</label>
                          <input
                            className="form-input" style={{paddingLeft:'14px'}}

                            placeholder="e.g. 8.5"

                      </div>

                        </select>
                      </div>
                    </div>

                        {SKILLS_LIST.map(s=>(
                          <button
                            key={s}
                            className={`skill-tag ${profile.skills.includes(s)?'selected':''}`}
                            onClick={()=>toggleSkill(s)}
                          >
                            {profile.skills.includes(s) ? '✓ ' : ''}{s}
                          </button>
                        ))}
                      </div>
                      <p className="text-muted" style={{marginTop:'14px'}}>
                        {profile.skills.length} selected{profile.skills.length>=3?' ✓':` (need ${3-profile.skills.length} more)`}
                      </p>
                    </div>
                  )}

                  {step === 2 && (
                    <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
                      <div className="form-group">
                        <label className="form-label">Target Role</label>
                        <select className="form-select" value={profile.goalRole} onChange={e=>update('goalRole',e.target.value)}>
                          <option value="">What role do you want?</option>
                          {GOAL_ROLES.map(r=>(
                            <option key={r} value={r}>{r}</option>
                          ))}
                        </select>
                      </div>
                      <div className="form-group">
                        <label className="form-label">Work Experience (optional)</label>
                        <select className="form-select" value={profile.experience} onChange={e=>update('experience',e.target.value)}>
                          <option value="">Any prior work experience?</option>
                          {['Fresher','Part-time job','Internship done','1 Year experience','2+ Years experience'].map(v=>(
                            <option key={v} value={v}>{v}</option>
                          ))}
                        </select>
                      </div>
                      <div className="form-group">
                        <label className="form-label">Tell AI about yourself (optional)</label>
                        <textarea
                          className="form-textarea"
                          placeholder="e.g. I'm passionate about building scalable web apps, worked on a food delivery project..."
                          value={profile.bio}
                          onChange={e=>update('bio',e.target.value)}
                          rows={4}
                        />
                      </div>
                    </div>
                  )}
                </motion.div>
              </AnimatePresence>

              <div style={{display:'flex',gap:'12px',marginTop:'28px'}}>
                {step > 0 && (
                  <button
                    className="btn btn-ghost"
                    style={{flex:'0 0 auto',padding:'14px 20px'}}
                    onClick={()=>setStep(s=>s-1)}
                  >← Back</button>
                )}
                {step < 2 ? (
                  <button
                    className="btn btn-primary btn-full btn-lg"
                    style={{opacity:canNext()?1:0.4,pointerEvents:canNext()?'auto':'none'}}
                    onClick={()=>setStep(s=>s+1)}
                  >
                    Continue →
                  </button>
                ) : (
                  <button
                    className="btn btn-teal btn-full btn-lg"
                    style={{opacity:canNext()?1:0.4,pointerEvents:canNext()?'auto':'none'}}
                    onClick={handleFinish}
                  >
                    🤖 Analyze My Profile
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ══════════════════════════════════════════════════════════
       AI ENGINE — generates analysis from profile data
     ══════════════════════════════════════════════════════════ */
    const generateAnalysis = (profile) => {
      const cgpa = parseFloat(profile.cgpa) || 6;
      const cgpaScore = Math.min(100, Math.round((cgpa / 10) * 100));
      const skillScore = Math.min(100, profile.skills.length * 7);
      const expBonus = profile.internships === 'None yet' ? 0
        : profile.internships === '1 Internship' ? 10
        : profile.internships === '2 Internships' ? 18
        : profile.internships === '3+ Internships' ? 25
        : profile.internships === 'Freelance Projects' ? 15 : 20;
      const employabilityScore = Math.min(98, Math.round((cgpaScore * 0.25) + (skillScore * 0.45) + expBonus + 12));

      const ROLE_SKILL_MAP = {
        'Software Engineer':        ['JavaScript','Python','Java','C++','Git','React','Node.js','Docker'],
        'Data Scientist':           ['Python','Machine Learning','TensorFlow','Data Analysis','SQL','Tableau','Power BI'],
        'Product Manager':          ['Leadership','Communication','Project Management','Problem Solving','UI/UX Design'],
        'UI/UX Designer':           ['Figma','UI/UX Design','Communication','Problem Solving','React'],
        'Full Stack Developer':     ['JavaScript','React','Node.js','SQL','Git','TypeScript','Docker','AWS'],
        'DevOps Engineer':          ['Docker','AWS','Git','Python','Linux','Kubernetes'],
        'Business Analyst':         ['SQL','Excel','Tableau','Communication','Problem Solving','Power BI'],
        'Machine Learning Engineer':['Python','TensorFlow','Machine Learning','Data Analysis','SQL','FastAPI'],
        'Cloud Architect':          ['AWS','Docker','Git','Python','TypeScript'],
        'Cybersecurity Analyst':    ['Python','Git','Communication','Problem Solving','Linux'],
        'Flutter Developer':        ['Flutter','Kotlin','Swift','Dart','Git'],
      };

      const userSkills = new Set(profile.skills);
      const roleMatches = Object.entries(ROLE_SKILL_MAP).map(([role, requiredSkills]) => {
        const matched = requiredSkills.filter(s => userSkills.has(s)).length;
        const raw = Math.round((matched / requiredSkills.length) * 100);
        const boost = role === profile.goalRole ? 12 : 0;
        return { role, pct: Math.min(99, raw + boost + Math.floor(Math.random() * 6)) };
      }).sort((a,b) => b.pct - a.pct).slice(0, 5);

      const allRequiredSkills = [...new Set(Object.values(ROLE_SKILL_MAP).flat())];
      const missing = allRequiredSkills.filter(s => !userSkills.has(s));
      const gapSkills = [
        { skill: missing[0] || 'TypeScript', current: 15, required: 85 },
        { skill: missing[1] || 'Docker',     current: 10, required: 75 },
        { skill: missing[2] || 'AWS',        current: 5,  required: 70 },
        { skill: missing[3] || 'SQL',        current: 30, required: 80 },
      ].map(g => ({ ...g, gap: g.required - g.current }));

      const roadmap = [
        { step:1, title:'Strengthen Core Skills', desc:`Complete courses in ${missing[0]||'TypeScript'} and ${missing[1]||'Docker'} on Coursera or freeCodeCamp.`, badge:'Week 1–4', color:'#7C3AED', icon:'📚' },
        { step:2, title:'Build Portfolio Projects', desc:'Create 2–3 projects that demonstrate your target role skills. Push to GitHub.', badge:'Week 5–8', color:'#06B6D4', icon:'💻' },
        { step:3, title:'Targeted Internship Apply', desc:'Apply to 15–20 companies matching your top role match. Tailor each resume.', badge:'Week 9–12', color:'#10B981', icon:'📨' },
        { step:4, title:'Mock Interviews & DSA', desc:'Practice 30 LeetCode problems, 5 mock interviews. Use Pramp or interviewing.io.', badge:'Week 13–16', color:'#F59E0B', icon:'🎯' },
      ];

      const insights = [
        `Your CGPA of ${cgpa} gives you a solid academic foundation — top companies shortlist above 7.5.`,
        `You have ${profile.skills.length} skills selected. Engineers with 8+ skills land offers ${Math.round(profile.skills.length*11)}% faster.`,
        profile.goalRole ? `${profile.goalRole} is a high-demand role with 40K+ openings in India this year.` : 'Defining a target role increases your job search efficiency by 3x.',
        `${expBonus > 0 ? 'Great — prior experience gives you a hiring advantage. Highlight it prominently on your resume.' : 'Consider applying to internships now — even a 2-month stint boosts offers by 45%.'}`
      ];

      return { employabilityScore, roleMatches, gapSkills, roadmap, insights };
    };

    /* ══════════════════════════════════════════════════════════
       ANALYZING SCREEN — fake AI loading effect
     ══════════════════════════════════════════════════════════ */
    const AnalyzingScreen = ({ onDone }) => {
      const steps = [
        'Scanning your profile data...',
        'Mapping skills to 500+ job roles...',
        'Running gap analysis engine...',
        'Generating career roadmap...',
        'Analysis complete ✓'
      ];
      const [doneSteps, setDoneSteps] = useState(0);

      useEffect(() => {
        let i = 0;
        const iv = setInterval(() => {
          i++;
          setDoneSteps(i);
          if (i >= steps.length) {
            clearInterval(iv);
            setTimeout(onDone, 600);
          }
        }, 700);
        return () => clearInterval(iv);
      }, []);

      return (
        <div className="analyzing-screen">
          <AnimatedBg />
          <div className="ai-orb">🤖</div>
          <div>
            <h2 className="title-lg gradient-text" style={{textAlign:'center'}}>AI Analyzing Your Profile</h2>
            <p className="text-sub" style={{textAlign:'center',marginTop:'8px'}}>This will only take a moment...</p>
          </div>
          <div className="analyzing-steps">
            {steps.map((s,i) => (
              <div key={i} className={`analyzing-step ${i < doneSteps ? 'done' : i === doneSteps ? 'active' : ''}`}>
                <span style={{fontSize:'1rem'}}>{i < doneSteps ? '✅' : i === doneSteps ? '⏳' : '⬜'}</span>
                {s}
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ══════════════════════════════════════════════════════════
       DASHBOARD — AI analysis results
     ══════════════════════════════════════════════════════════ */
    const ScoreRing = ({ score }) => {
      const r = 50; const circ = 2 * Math.PI * r;
      const dash = circ - (circ * score) / 100;
      return (
        <div className="score-ring">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="10" />
            <circle
              cx="60" cy="60" r={r} fill="none"
              stroke="url(#scoreGrad)" strokeWidth="10"
              strokeDasharray={circ}
              strokeDashoffset={dash}
              strokeLinecap="round"
              style={{transition:'stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1)'}}
            />
            <defs>
              <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#7C3AED" />
                <stop offset="100%" stopColor="#06B6D4" />
              </linearGradient>
            </defs>
          </svg>
          <div className="score-ring-num">
            <span className="score-num">{score}</span>
            <span className="score-label">/100</span>
          </div>
        </div>
      );
    };

    const Dashboard = ({ profile, analysis, onSignOut }) => {
      const [visible, setVisible] = useState(false);
      useEffect(() => { setTimeout(() => setVisible(true), 200); }, []);

      const { employabilityScore, roleMatches, gapSkills, roadmap, insights } = analysis;
      const session = (() => { try { return JSON.parse(localStorage.getItem('ag_session')); } catch { return null; } })();
      const name = session?.email?.split('@')[0] || 'Superstar';

      const matchColor = (pct) => pct >= 75 ? '#10B981' : pct >= 50 ? '#F59E0B' : '#EF4444';

      return (
        <div className="dashboard">
          <AnimatedBg />
          <div className="top-bar">
            <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
              <div className="logo-icon" style={{width:'40px',height:'40px',fontSize:'1.1rem'}}>⚡</div>
              <div>
                <span style={{fontFamily:'Space Grotesk',fontWeight:'700',fontSize:'1.1rem'}}>SkillBridge</span>
                <div style={{fontSize:'0.75rem',color:'var(--text-muted)'}}>AI Career Analyzer</div>
              </div>
            </div>
            <button
              className="btn btn-ghost"
              style={{padding:'8px 16px',fontSize:'0.85rem'}}
              onClick={onSignOut}
            >Sign Out</button>
          </div>

          <div style={{marginBottom:'28px'}}>
            <h1 className="title-xl" style={{fontSize:'clamp(1.6rem,4vw,2.4rem)'}}>
              Hey <span className="gradient-text">{name}</span> 👋
            </h1>
            <p className="text-sub" style={{marginTop:'6px'}}>Your AI-powered career analysis is ready. Here's what the data says.</p>
          </div>

          <div className="dash-grid">
            {/* EMPLOYABILITY SCORE */}
            <motion.div
              className="dash-card"
              initial={{opacity:0,y:24}} animate={{opacity:1,y:0}} transition={{delay:0.1}}
            >
              <div className="dash-card-title">🎯 Employability Score</div>
              <ScoreRing score={visible ? employabilityScore : 0} />
              <p style={{textAlign:'center',fontSize:'0.9rem',color:'var(--text-secondary)',marginBottom:'12px'}}>
                {employabilityScore >= 80 ? '🔥 Exceptional — Top 15% of candidates' :
                 employabilityScore >= 65 ? '✅ Strong — Well above average' :
                 employabilityScore >= 50 ? '📈 Good — A few improvements needed' :
                 '🚀 Getting started — Great potential ahead'}
              </p>
              <div style={{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap'}}>
                {profile.skills.slice(0,4).map(s=>(
                  <span key={s} style={{fontSize:'0.72rem',padding:'3px 10px',borderRadius:'20px',background:'rgba(124,58,237,0.15)',border:'1px solid rgba(124,58,237,0.3)',color:'#C4B5FD'}}>{s}</span>
                ))}
              </div>
            </motion.div>

            {/* ROLE MATCHES */}
            <motion.div
              className="dash-card"
              initial={{opacity:0,y:24}} animate={{opacity:1,y:0}} transition={{delay:0.2}}
            >
              <div className="dash-card-title">🏆 Best Role Matches</div>
              <div className="role-match-list">
                {roleMatches.map((r,i) => (
                  <div className="role-match-item" key={r.role}>
                    <div className="role-match-header">
                      <span className="role-match-name">
                        {i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '} {r.role}
                      </span>
                      <span className="role-match-pct" style={{color:matchColor(r.pct)}}>{r.pct}%</span>
                    </div>
                    <div className="match-bar">
                      <div
                        className="match-bar-fill"
                        style={{
                          width: visible ? `${r.pct}%` : '0%',
                          background: `linear-gradient(90deg, ${matchColor(r.pct)}, ${matchColor(r.pct)}88)`
                        }}
                      />
                    </div>
                  </div>
                ))}
              </div>
            </motion.div>

            {/* SKILL GAP */}
            <motion.div
              className="dash-card"
              initial={{opacity:0,y:24}} animate={{opacity:1,y:0}} transition={{delay:0.3}}
            >
              <div className="dash-card-title">⚡ Skill Gap Analysis</div>
              <div className="gap-list">
                {gapSkills.map(g => (
                  <div className="gap-item" key={g.skill}>
                    <div className="gap-header">
                      <span className="gap-skill-name">{g.skill}</span>
                      <span className="gap-score">You: {g.current}% → Need: {g.required}%</span>
                    </div>
                    <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                      <div className="gap-bar" style={{flex:1}}>
                        <div className="gap-bar-fill" style={{width:visible?`${g.current}%`:'0%',background:'rgba(239,68,68,0.6)'}} />
                      </div>
                    </div>
                    <div className="gap-bar" style={{marginTop:'3px'}}>
                      <div className="gap-bar-fill" style={{width:visible?`${g.required}%`:'0%',background:'linear-gradient(90deg,#7C3AED,#06B6D4)'}} />
                    </div>
                  </div>
                ))}
              </div>
              <p style={{fontSize:'0.75rem',color:'var(--text-muted)',marginTop:'16px'}}>
                <span style={{color:'rgba(239,68,68,0.8)'}}>■</span> Your Level &nbsp;
                <span style={{color:'#7C3AED'}}>■</span> Industry Required
              </p>
            </motion.div>

            {/* AI INSIGHTS */}
            <motion.div
              className="dash-card"
              initial={{opacity:0,y:24}} animate={{opacity:1,y:0}} transition={{delay:0.4}}
            >
              <div className="dash-card-title">🤖 AI Insights</div>
              <div className="insights-list">
                {insights.map((ins,i) => (
                  <div className="insight-item" key={i}>
                    <span className="insight-icon">{['💡','📊','🎯','💼'][i]}</span>
                    <span>{ins}</span>
                  </div>
                ))}
              </div>
            </motion.div>

            {/* CAREER ROADMAP — full width */}
            <motion.div
              className="dash-card"
              style={{gridColumn:'1/-1'}}
              initial={{opacity:0,y:24}} animate={{opacity:1,y:0}} transition={{delay:0.5}}
            >
              <div className="dash-card-title">🗺 Your 16-Week Career Roadmap</div>
              <div className="roadmap-list">
                {roadmap.map((item,i) => (
                  <div className="roadmap-item" key={item.step}>
                    <div className="roadmap-line">
                      <div className="roadmap-dot" style={{background:`${item.color}22`,border:`2px solid ${item.color}`}}>
                        {item.icon}
                      </div>
                      {i < roadmap.length-1 && <div className="roadmap-connector" />}
                    </div>
                    <div className="roadmap-content">
                      <div className="roadmap-title">{item.title}</div>
                      <div className="roadmap-desc">{item.desc}</div>
                      <span
                        className="roadmap-badge"
                        style={{background:`${item.color}18`,border:`1px solid ${item.color}44`,color:item.color}}
                      >{item.badge}</span>
                    </div>
                  </div>
                ))}
              </div>
            </motion.div>
          </div>
        </div>
      );
    };

    /* ══════════════════════════════════════════════════════════
       APP ROOT
     ══════════════════════════════════════════════════════════ */
    const App = () => {
      const [appScreen, setAppScreen] = useState('auth');
      const [profile, setProfile] = useState(null);
      const [analysis, setAnalysis] = useState(null);

      // Session check on mount
      useEffect(() => {
        const session =
          (() => { try { return JSON.parse(localStorage.getItem('ag_session')); } catch { return null; } })() ||
          (() => { try { return JSON.parse(sessionStorage.getItem('ag_session')); } catch { return null; } })();
        const savedProfile = (() => { try { return JSON.parse(localStorage.getItem('antigravity_student_profile')); } catch { return null; } })();
        const savedAnalysis = (() => { try { return JSON.parse(localStorage.getItem('antigravity_analysis')); } catch { return null; } })();

        if (session && savedProfile && savedAnalysis) {
          setProfile(savedProfile);
          setAnalysis(savedAnalysis);
          setAppScreen('dashboard');
        } else if (session && savedProfile) {
          setProfile(savedProfile);
          setAppScreen('analyzing');
        } else if (session) {
          setAppScreen('onboarding');
        }
      }, []);

      const handleLoginComplete = () => {
        const savedProfile = (() => { try { return JSON.parse(localStorage.getItem('antigravity_student_profile')); } catch { return null; } })();
        if (savedProfile) {
          const a = generateAnalysis(savedProfile);
          localStorage.setItem('antigravity_analysis', JSON.stringify(a));
          setProfile(savedProfile);
          setAnalysis(a);
          setAppScreen('dashboard');
        } else {
          setAppScreen('onboarding');
        }
      };

      const handleSignupComplete = () => {
        setAppScreen('onboarding');
      };

      const handleProfileComplete = (p) => {
        setProfile(p);
        setAppScreen('analyzing');
      };

      const handleAnalysisDone = () => {
        const a = generateAnalysis(profile);
        localStorage.setItem('antigravity_analysis', JSON.stringify(a));
        setAnalysis(a);
        setAppScreen('dashboard');
      };

      const handleSignOut = () => {
        localStorage.removeItem('ag_session');
        localStorage.removeItem('antigravity_student_profile');
        localStorage.removeItem('antigravity_analysis');
        sessionStorage.removeItem('ag_session');
        setProfile(null);
        setAnalysis(null);
        setAppScreen('auth');
      };

      if (appScreen === 'auth') return <AuthShell onLoginComplete={handleLoginComplete} onSignupComplete={handleSignupComplete} />;
      if (appScreen === 'onboarding') return <ProfileWizard onComplete={handleProfileComplete} />;
      if (appScreen === 'analyzing') return <AnalyzingScreen onDone={handleAnalysisDone} />;
      if (appScreen === 'dashboard' && analysis) return <Dashboard profile={profile} analysis={analysis} onSignOut={handleSignOut} />;
      return null;
    };

    /* ══════════════════════════════════════════════════════════
       MOUNT
     ══════════════════════════════════════════════════════════ */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AuthProvider>
        <ToastProvider>
          <AnimatedBg />
          <App />
        </ToastProvider>
      </AuthProvider>
    );
  </script>

</body>
</html>
